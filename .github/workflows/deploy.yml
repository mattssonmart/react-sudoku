name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"] # Dubbelkolla om din branch heter main eller master

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './Sudoko/package-lock.json'

      - name: Install and Build
        run: |
          cd Sudoko
          npm install
          npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Viktigt: Vi pekar på dist-mappen som skapas inuti Sudoko
          path: './Sudoko/dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4